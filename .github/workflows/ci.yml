name: CI

on:
  pull_request:
  push:
    branches: [master, stage]

env:
  # Some component tests fire real fetches through hooks. A fast-refusing
  # local address makes those reject while components are still mounted, so
  # the hooks' error handling runs normally — an unresolvable hostname makes
  # rejections land after jsdom teardown and crash the run as unhandled
  # errors ("window is not defined").
  NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:9
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
  SUPABASE_SERVICE_KEY: placeholder-service-key

jobs:
  checks:
    name: tsc + vitest + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: i18n key parity
        working-directory: apps/web
        run: node scripts/check-i18n-keys.mjs

      - name: TypeScript check
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Unit tests
        working-directory: apps/web
        run: npx vitest run

      - name: Production build
        working-directory: apps/web
        run: npx next build
